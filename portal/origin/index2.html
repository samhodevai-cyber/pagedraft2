<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼호개발 복지포털</title>
<style>
  :root{ --teal:#15bfa6; --blue:#3b7ad9; --primary:#2f6fd1; --menu:#6b6c8c; --bg:#eef2f7; --line:#e3e8ef; --ink:#3a4252; --muted:#8a93a3; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",sans-serif; background:var(--bg); color:#2b3445; line-height:1.5; }
  .icon{ width:22px; height:22px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .chev{ fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  /* TOP BAND */
  .topband{ background:linear-gradient(90deg,#15bfa6 0%,#2f97ce 55%,#3b7ad9 100%); color:#fff; height:44px; display:flex; align-items:center; justify-content:space-between; padding:0 18px; font-size:13px; }
  .tb-left{ display:flex; align-items:center; gap:16px; font-weight:600; }
  .tb-right{ display:flex; align-items:center; gap:14px; font-size:12.5px; opacity:.96; }
  .tb-link{ display:flex; align-items:center; gap:5px; color:#fff; text-decoration:none; cursor:pointer; }
  .tb-link svg{ width:15px; height:15px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tb-link:hover{ opacity:.8; }

  /* NAV BAND */
  .navband{ background:#fff; border-bottom:1px solid var(--line); display:flex; align-items:center; padding:0 18px; height:58px; gap:18px; position:sticky; top:0; z-index:30; }
  .brand{ display:flex; align-items:center; gap:9px; flex-shrink:0; cursor:pointer; }
  .brand svg{ width:30px; height:30px; }
  .brand .bt{ font-weight:700; color:var(--ink); font-size:17px; letter-spacing:-.3px; }
  .brand .bt span{ color:var(--muted); font-weight:600; font-size:15px; margin-left:2px; }
  .menu{ display:flex; align-items:center; gap:4px; flex:1; overflow-x:auto; scrollbar-width:none; }
  .menu::-webkit-scrollbar{ display:none; }
  .menu button{ border:none; background:none; font-family:inherit; font-size:15px; font-weight:600; color:var(--menu); padding:8px 15px; border-radius:7px; cursor:pointer; white-space:nowrap; transition:.15s; }
  .menu button:hover{ background:#f1f4f9; color:var(--primary); }
  .menu button.active{ background:#e9f1fc; color:var(--primary); }

  /* SEARCH ROW */
  .searchrow{ background:#fff; border-bottom:1px solid var(--line); padding:9px 18px; display:flex; justify-content:flex-end; }
  .searchbox{ position:relative; width:100%; max-width:320px; }
  .searchbox svg.s{ position:absolute; left:13px; top:50%; transform:translateY(-50%); width:16px; height:16px; stroke:#94a3b8; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .searchbox input{ width:100%; padding:9px 36px 9px 38px; border-radius:8px; border:1px solid #d8dee7; background:#f8fafc; font-size:13.5px; font-family:inherit; }
  .searchbox input:focus{ outline:none; border-color:var(--primary); background:#fff; box-shadow:0 0 0 3px rgba(47,111,209,.12); }
  .clearbtn{ position:absolute; right:10px; top:50%; transform:translateY(-50%); border:none; background:none; cursor:pointer; padding:3px; border-radius:50%; color:#94a3b8; display:none; }
  .clearbtn:hover{ background:#eef1f5; }

  .wrap{ max-width:1000px; margin:0 auto; padding:22px 18px 64px; }

  /* PANEL HEADERS */
  .ph{ display:flex; align-items:center; gap:8px; margin:28px 0 14px; flex-wrap:wrap; }
  .ph:first-child{ margin-top:4px; }
  .ph-bar{ width:4px; height:17px; background:var(--primary); border-radius:2px; display:inline-block; }
  .ph h2{ font-size:17px; font-weight:700; color:var(--ink); }
  .ph p{ font-size:13px; color:var(--muted); }

  /* HOME quick cards */
  .qgrid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  @media(min-width:720px){ .qgrid{ grid-template-columns:repeat(4,1fr); } }
  .qcard{ display:flex; align-items:center; gap:12px; text-align:left; background:#fff; border:1px solid var(--line); border-radius:8px; padding:16px; cursor:pointer; font-family:inherit; transition:.15s; }
  a.qcard{ text-decoration:none; color:inherit; }
  .qcard:hover{ border-color:#c7d3e3; box-shadow:0 3px 10px rgba(47,111,209,.1); }
  .qic{ width:42px; height:42px; border-radius:9px; display:flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0; }
  .qic .icon{ width:22px; height:22px; }
  .qtx h3{ font-size:15px; font-weight:700; color:var(--ink); }
  .qtx p{ font-size:12px; color:var(--muted); margin-top:1px; }

  /* PANELS */
  .grid2{ display:grid; gap:14px; margin-top:6px; }
  @media(min-width:720px){ .grid2{ grid-template-columns:1fr 1fr; } }
  .panel{ background:#fff; border:1px solid var(--line); border-radius:8px; }
  .panel-head{ display:flex; align-items:center; gap:8px; padding:13px 16px; border-bottom:1px solid #eef1f5; }
  .panel-head h3{ font-size:15px; font-weight:700; color:var(--ink); }
  .panel-body{ padding:16px; }
  .dot-list{ list-style:none; }
  .dot-list li{ position:relative; padding-left:15px; font-size:14px; color:#4b5563; margin-bottom:9px; }
  .dot-list li:last-child{ margin-bottom:0; }
  .dot-list li::before{ content:""; position:absolute; left:0; top:8px; width:5px; height:5px; border-radius:50%; background:var(--primary); }
  .kv{ display:flex; justify-content:space-between; align-items:center; font-size:14px; padding:9px 0; border-bottom:1px dashed #eceff3; }
  .kv:first-child{ padding-top:0; }
  .kv:last-child{ border-bottom:none; padding-bottom:0; }
  .kv span{ color:#64748b; }
  .kv b{ color:#3a4252; font-weight:600; }
  a.tel{ color:var(--primary); text-decoration:none; font-weight:600; }

  /* benefit cards */
  .b-grid{ display:grid; gap:12px; }
  @media(min-width:640px){ .b-grid{ grid-template-columns:1fr 1fr; } }
  .b-card{ text-align:left; background:#fff; border-radius:8px; border:1px solid var(--line); padding:18px; width:100%; font-family:inherit; transition:.15s; }
  .b-card.clickable{ cursor:pointer; }
  .b-card.clickable:hover{ border-color:#c7d3e3; box-shadow:0 3px 10px rgba(47,111,209,.1); }
  .b-ic{ width:42px; height:42px; border-radius:9px; background:#f4f7fb; display:flex; align-items:center; justify-content:center; margin-bottom:12px; }
  .b-card h3{ font-weight:700; color:var(--ink); margin-bottom:4px; display:flex; align-items:center; gap:4px; font-size:15px; }
  .b-card h3 .chev{ width:15px; height:15px; stroke:#cbd5e1; }
  .b-card p{ font-size:13.5px; color:#64748b; line-height:1.55; }

  /* leave list */
  .leave-item{ width:100%; text-align:left; background:#fff; border-radius:8px; border:1px solid var(--line); padding:18px; cursor:pointer; display:flex; align-items:center; gap:15px; font-family:inherit; transition:.15s; margin-bottom:12px; }
  .leave-item:hover{ border-color:#c7d3e3; box-shadow:0 3px 10px rgba(47,111,209,.1); }
  .leave-ic{ width:42px; height:42px; border-radius:9px; background:#ecfdf5; display:flex; align-items:center; justify-content:center; color:#059669; flex-shrink:0; }
  .leave-item .body{ flex:1; min-width:0; }
  .leave-item h3{ font-weight:700; color:var(--ink); font-size:15px; }
  .leave-item p{ font-size:13.5px; color:#64748b; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .leave-item .chev{ width:20px; height:20px; stroke:#cbd5e1; flex-shrink:0; }

  .green-box{ background:#f0fdf8; border:1px solid #c8efdd; border-left:4px solid #10b981; border-radius:8px; padding:18px; margin-bottom:22px; }
  .green-box h3{ font-weight:700; color:#065f46; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .green-box h3 .icon{ width:18px; height:18px; }
  .green-box .line{ font-size:14px; color:rgba(6,78,59,.85); margin-bottom:6px; }
  .green-box .sub{ padding-left:12px; color:rgba(4,120,87,.7); }

  /* tables */
  .tbl-wrap{ background:#fff; border-radius:8px; border:1px solid var(--line); overflow:hidden; }
  table{ width:100%; border-collapse:collapse; font-size:14px; }
  thead tr{ background:#f3f6fb; }
  th{ font-size:12.5px; font-weight:600; color:#5b6675; padding:11px 16px; text-align:right; }
  th:first-child{ text-align:left; }
  td{ padding:11px 16px; text-align:right; color:#3a4252; border-top:1px solid #f1f4f8; }
  td:first-child{ text-align:left; font-weight:600; }
  .tbl-note{ font-size:12px; color:var(--muted); padding:11px 16px; background:#fafbfc; border-top:1px solid #f1f4f8; }

  .detail-card{ background:#fff; border-radius:8px; border:1px solid var(--line); padding:18px; font-size:14px; color:#4b5563; }
  .detail-card p{ margin-bottom:8px; }
  .detail-card p:last-child{ margin-bottom:0; }
  .amber-box{ background:#fffbeb; border:1px solid #fde9b8; border-radius:8px; padding:12px; margin:6px 0; }
  .amber-box .h{ font-weight:700; color:#92400e; margin-bottom:4px; }
  .muted{ font-size:12px; color:var(--muted); }

  .addr-card{ background:#fff; border-radius:8px; border:1px solid var(--line); padding:18px; margin-bottom:12px; }
  .addr-card h3{ font-weight:700; color:var(--ink); margin-bottom:9px; }
  .addr-card .ar{ display:flex; gap:8px; font-size:14px; color:#4b5563; margin-bottom:6px; }
  .addr-card .ar svg{ width:16px; height:16px; stroke:#94a3b8; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; margin-top:2px; }

  .value-card{ background:#fff; border-radius:8px; border:1px solid var(--line); padding:18px; display:flex; gap:15px; align-items:center; margin-bottom:12px; }
  .value-num{ width:38px; height:38px; border-radius:50%; background:#ede9fe; color:#7c3aed; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }
  .value-card h4{ font-weight:700; color:var(--ink); }
  .value-card p{ font-size:14px; color:#64748b; }
  .footer-note{ text-align:center; font-size:12px; color:var(--muted); margin-top:24px; }

  /* search results */
  .sr-count{ font-size:14px; color:var(--muted); margin:4px 0 12px; }
  .sr-item{ width:100%; text-align:left; background:#fff; border-radius:8px; border:1px solid var(--line); padding:15px; cursor:pointer; display:flex; gap:12px; align-items:flex-start; font-family:inherit; transition:.15s; margin-bottom:8px; }
  .sr-item:hover{ border-color:#c7d3e3; box-shadow:0 2px 8px rgba(47,111,209,.08); }
  .sr-ic{ width:36px; height:36px; border-radius:9px; background:#eef4fc; display:flex; align-items:center; justify-content:center; color:var(--primary); flex-shrink:0; }
  .sr-ic .icon{ width:18px; height:18px; }
  .sr-item .h{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .sr-item .h .nm{ font-weight:700; color:var(--ink); font-size:14px; }
  .sr-item .h .tag{ font-size:11px; padding:2px 7px; border-radius:4px; background:#eef2f7; color:#64748b; }
  .sr-item .d{ font-size:12px; color:#64748b; margin-top:2px; }
  .empty{ text-align:center; padding:48px 0; color:var(--muted); font-size:14px; }

  /* banner */
  .banner{ position:relative; height:90px; border-radius:8px; overflow:hidden; margin-bottom:22px; display:flex; align-items:center; padding:0 20px; }
  .banner-cap{ color:#fff; font-size:16px; font-weight:700; line-height:1.45; max-width:54%; position:relative; z-index:2; text-shadow:0 1px 2px rgba(0,0,0,.12); }
  .banner-art{ position:absolute; right:6px; top:50%; transform:translateY(-50%); display:flex; align-items:center; opacity:.97; }

  /* modal */
  .overlay{ position:fixed; inset:0; background:rgba(15,23,42,.45); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
  @media(min-width:640px){ .overlay{ align-items:center; padding:16px; } }
  .modal{ background:#fff; border-radius:16px 16px 0 0; width:100%; max-height:85vh; overflow-y:auto; }
  @media(min-width:640px){ .modal{ border-radius:12px; max-width:520px; } }
  .modal-head{ position:sticky; top:0; background:#fff; padding:20px 22px 15px; border-bottom:1px solid #eef1f5; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .modal-head .left{ display:flex; align-items:center; gap:12px; }
  .modal-ic{ width:40px; height:40px; border-radius:9px; background:#eef4fc; display:flex; align-items:center; justify-content:center; color:var(--primary); flex-shrink:0; }
  .modal-ic .icon{ width:20px; height:20px; }
  .modal-head h3{ font-weight:700; font-size:18px; color:var(--ink); }
  .modal-close{ padding:8px; margin-right:-8px; border:none; background:none; cursor:pointer; border-radius:8px; color:#94a3b8; }
  .modal-close:hover{ background:#f1f5f9; }
  .modal-body{ padding:18px 22px; }
  .modal-body .pl{ font-size:14px; color:#4b5563; white-space:pre-line; line-height:1.7; }
  .modal-body .leave-info{ font-size:14px; color:#64748b; margin-bottom:8px; display:flex; gap:8px; }
  .modal-body .leave-info .dot{ color:#10b981; }
  .modal-body h4{ font-weight:700; color:var(--ink); margin:20px 0 12px; }
  .step{ display:flex; gap:12px; margin-bottom:12px; }
  .step .n{ width:24px; height:24px; border-radius:50%; background:#10b981; color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
  .step p{ font-size:14px; color:#4b5563; line-height:1.6; }
  .guide-thumb{ width:100%; max-width:330px; border-radius:8px; border:1px solid #e2e8f0; cursor:zoom-in; display:block; box-shadow:0 2px 8px rgba(0,0,0,.12); transition:transform .15s; }
  .guide-thumb:hover{ transform:scale(1.02); }
  .img-miss{ display:none; padding:24px 16px; text-align:center; font-size:13px; color:var(--muted); background:#f8fafc; border:1px dashed #cbd5e1; border-radius:8px; max-width:330px; line-height:1.6; }
  .img-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.88); display:flex; align-items:center; justify-content:center; z-index:100; cursor:zoom-out; padding:20px; }
  .img-overlay img{ max-width:100%; max-height:100%; border-radius:8px; box-shadow:0 8px 30px rgba(0,0,0,.5); }
  .hidden{ display:none !important; }
</style>
</head>

  leaveTypes.forEach((l,i)=>{
    h+='<button class="leave-item" onclick="openModal(\'leave'+i+'\')"><div class="leave-ic">'+svg(l.icon)+'</div><div class="body"><h3>'+l.t+'</h3><p>'+l.info[0]+'</p></div>'+svg('chevR','chev')+'</button>';
  });
  content.innerHTML=h;
}

function tableHtml(rows,note){
  let h='<div class="tbl-wrap"><table><thead><tr><th>직급</th><th>현장</th><th>본사</th></tr></thead><tbody>';
  rows.forEach(r=>h+='<tr><td>'+r[0]+'</td><td>'+r[1]+'</td><td>'+r[2]+'</td></tr>');
  h+='</tbody></table>'+(note?'<div class="tbl-note">※ '+note+'</div>':'')+'</div>';
  return h;
}

function renderSearch(){
  const q=search.toLowerCase();
  const res=searchIndex.filter(i=>((i.t+' '+(i.d||'')).toLowerCase().includes(q)));
  let h='<p class="sr-count">'+res.length+'건의 결과</p>';
  if(res.length===0){ h+='<div class="empty">검색 결과가 없습니다.<br>복지 신청 관련 문의는 총무부로 연락해 주세요.</div>'; }
  res.forEach(r=>{
    h+='<button class="sr-item" onclick="goFromSearch(\''+r.target+'\')"><div class="sr-ic">'+svg(r.icon)+'</div><div><div class="h"><span class="nm">'+r.t+'</span><span class="tag">'+r.cat+'</span></div><div class="d">'+(r.d||'')+'</div></div></button>';
  });
  content.innerHTML=h;
  window.scrollTo(0,0);
}

function openModal(key){
  let item;
  if(key.startsWith('basic')) item=basicBenefits[+key.slice(5)];
  else if(key.startsWith('extra')) item=extraBenefits[+key.slice(5)];
  else if(key.startsWith('edu')) item=education[+key.slice(3)];
  else if(key.startsWith('leave')){ item=leaveTypes[+key.slice(5)]; item={...item,isLeave:true}; }
  if(!item) return;
  let body='';
  if(item.isLeave){
    item.info.forEach(t=>body+='<p class="leave-info"><span class="dot">•</span>'+t+'</p>');
    body+='<h4>신청 단계</h4>';
    item.steps.forEach((s,i)=>body+='<div class="step"><div class="n">'+(i+1)+'</div><p>'+s+'</p></div>');
    if(item.img){
      body+='<h4>ERP 신청 화면</h4>';
      body+='<img src="'+item.img+'" class="guide-thumb" alt="연차 신청 화면 가이드" onclick="openImg(this.src)" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">';
      body+='<div class="img-miss">이미지 파일(<b>'+item.img+'</b>)을<br>HTML 파일과 같은 폴더에 넣어주세요.</div>';
      body+='<p class="muted" style="margin-top:8px">이미지를 누르면 크게 볼 수 있습니다.</p>';
    }
  } else {
    body='<p class="pl">'+esc(item.more||item.d)+'</p>';
  }
  modalRoot.innerHTML='<div class="overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()"><div class="modal-head"><div class="left"><div class="modal-ic">'+svg(item.icon)+'</div><h3>'+item.t+'</h3></div><button class="modal-close" onclick="closeModal()">'+svg('x')+'</button></div><div class="modal-body">'+body+'</div></div></div>';
}
function closeModal(e){ modalRoot.innerHTML=''; }
function openImg(src){ var d=document.createElement('div'); d.className='img-overlay'; d.onclick=function(){ d.remove(); }; d.innerHTML='<img src="'+src+'" alt="연차 신청 화면 가이드">'; document.body.appendChild(d); }

function go(v){ view=v; search=''; searchInput.value=''; clearBtn.style.display='none'; render(); }
function goFromSearch(v){ view=v; search=''; searchInput.value=''; clearBtn.style.display='none'; render(); }

searchInput.addEventListener('input', e=>{ search=e.target.value; clearBtn.style.display=search?'block':'none'; render(); });
clearBtn.addEventListener('click', ()=>{ search=''; searchInput.value=''; clearBtn.style.display='none'; render(); });

render();
</script>
</body>
