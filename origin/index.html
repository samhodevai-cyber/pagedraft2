<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>제휴 콘도 예약</title>
<style>
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --line: #e3e7ef;
    --text: #1f2433;
    --muted: #6b7280;
    --brand: #3b5bdb;
    --brand-dark: #2f49b3;
    --accent: #f59f00;
    --danger: #e03131;
    --danger-bg: #ffe3e3;
    --ok: #2f9e44;
    --ok-bg: #ebfbee;
    --warn: #f08c00;
    --warn-bg: #fff4e6;
    --shadow: 0 1px 3px rgba(20, 30, 60, .08), 0 6px 20px rgba(20, 30, 60, .06);
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 14px; }
  a { color: inherit; }

  /* ---------- Top bar ---------- */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--line);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 20;
    flex-wrap: wrap;
  }
  .topbar .logo { font-weight: 800; font-size: 17px; color: var(--brand); }
  .topbar .spacer { flex: 1; }
  .topbar .userbox { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
  .tabs { display: flex; gap: 6px; }
  .tabs button {
    border: 1px solid var(--line);
    background: #fff;
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
  }
  .tabs button.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  .btn-logout {
    border: 1px solid var(--line); background: #fff; color: var(--muted);
    padding: 6px 12px; border-radius: 8px; font-size: 12px;
  }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 22px 18px 60px; }
  h2.section { font-size: 20px; margin: 4px 0 16px; }
  .muted { color: var(--muted); }

  /* ---------- Buttons ---------- */
  .btn {
    border: none; border-radius: 10px; padding: 11px 18px;
    font-size: 14px; font-weight: 600; background: var(--brand); color: #fff;
  }
  .btn:hover { background: var(--brand-dark); }
  .btn.block { width: 100%; }
  .btn.ghost { background: #fff; color: var(--text); border: 1px solid var(--line); }
  .btn.ghost:hover { background: #f6f8fc; }
  .btn.sm { padding: 7px 12px; font-size: 13px; }
  .btn.warn { background: var(--warn); }
  .btn.ok { background: var(--ok); }
  .btn.danger { background: var(--danger); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ---------- Login ---------- */
  .login-wrap {
    min-height: calc(100vh - 0px);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .login-card {
    background: var(--card); width: 100%; max-width: 380px;
    border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px 26px;
  }
  .login-card h1 { font-size: 22px; margin: 0 0 6px; }
  .login-card p.sub { margin: 0 0 22px; color: var(--muted); font-size: 13px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 11px 12px; border: 1px solid var(--line);
    border-radius: 10px; background: #fbfcfe; outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--brand); background: #fff; }
  .err { color: var(--danger); font-size: 13px; margin: 8px 0 0; min-height: 18px; }
  .hint-box { background: #f0f4ff; border: 1px solid #dbe4ff; color: #364fc7;
    font-size: 12px; border-radius: 10px; padding: 10px 12px; margin-top: 16px; }

  /* ---------- Cards grid ---------- */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
  .condo-card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform .12s, box-shadow .12s;
  }
  .condo-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(20,30,60,.12); }
  .condo-photo { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 46px; }
  .condo-body { padding: 14px 16px 18px; }
  .condo-body h3 { margin: 0 0 4px; font-size: 16px; }
  .condo-body .loc { font-size: 13px; color: var(--muted); }

  /* ---------- Detail ---------- */
  .detail-header {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 18px 20px; box-shadow: var(--shadow); display: flex; gap: 16px; align-items: center; margin-bottom: 18px;
  }
  .detail-header .icon { font-size: 44px; }
  .detail-header h2 { margin: 0 0 2px; font-size: 20px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
  @media (max-width: 760px) { .grid-2 { grid-template-columns: 1fr; } }
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 18px 20px; box-shadow: var(--shadow); }
  .panel h3 { margin: 0 0 14px; font-size: 16px; }

  /* ---------- Calendar ---------- */
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-head .title { font-weight: 700; }
  .cal-nav { border: 1px solid var(--line); background: #fff; border-radius: 8px; width: 32px; height: 32px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow { text-align: center; font-size: 12px; color: var(--muted); padding: 4px 0; font-weight: 600; }
  .cal-cell {
    aspect-ratio: 1 / 1; border: 1px solid transparent; border-radius: 9px;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    background: #f6f8fc; cursor: pointer; user-select: none;
  }
  .cal-cell.empty { background: transparent; cursor: default; }
  .cal-cell.past { color: #c5cad6; background: #f6f8fc; cursor: not-allowed; }
  .cal-cell.avail:hover { border-color: var(--brand); }
  .cal-cell.booked { background: var(--danger-bg); color: var(--danger); cursor: not-allowed; text-decoration: line-through; }
  .cal-cell.sel { background: var(--brand); color: #fff; font-weight: 700; }
  .cal-cell.inrange { background: #dbe4ff; color: var(--brand-dark); }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 14px; font-size: 12px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 12px; height: 12px; border-radius: 4px; display: inline-block; }

  /* ---------- Tables / lists ---------- */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; margin-bottom: 20px; }
  .summary .scard { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; box-shadow: var(--shadow); }
  .summary .scard .num { font-size: 28px; font-weight: 800; }
  .summary .scard .lbl { font-size: 13px; color: var(--muted); }

  .reqlist { display: flex; flex-direction: column; gap: 12px; }
  .reqcard { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px 18px; box-shadow: var(--shadow); }
  .reqcard .row1 { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; flex-wrap: wrap; }
  .reqcard h4 { margin: 0 0 4px; font-size: 15px; }
  .reqcard .meta { font-size: 13px; color: var(--muted); }
  .reqcard .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .reject-reason { background: var(--danger-bg); color: #c92a2a; border-radius: 8px; padding: 8px 10px;
    font-size: 13px; margin-top: 10px; }

  .badge { display: inline-block; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
  .badge.recv { background: #e7f5ff; color: #1971c2; }
  .badge.review { background: var(--warn-bg); color: var(--warn); }
  .badge.approved { background: var(--ok-bg); color: var(--ok); }
  .badge.rejected { background: var(--danger-bg); color: var(--danger); }

  .empty-state { text-align: center; color: var(--muted); padding: 40px 0; }

  /* ---------- Modal ---------- */
  .overlay { position: fixed; inset: 0; background: rgba(15,20,40,.45); display: none;
    align-items: center; justify-content: center; z-index: 50; padding: 18px; }
  .overlay.show { display: flex; }
  .modal { background: #fff; border-radius: var(--radius); padding: 24px; width: 100%; max-width: 420px; box-shadow: var(--shadow); }
  .modal h3 { margin: 0 0 6px; }

  /* ---------- Toast ---------- */
  .toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    background: #1f2433; color: #fff; padding: 13px 20px; border-radius: 12px; font-size: 14px;
    box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: .3s; z-index: 60; max-width: 90vw; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hidden { display: none !important; }
  .policy { background: var(--warn-bg); color: #b86200; border: 1px solid #ffe8cc;
    font-size: 12px; border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; }
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="view-login" class="login-wrap">
  <div class="login-card">
    <h1>제휴 콘도 예약</h1>
    <p class="sub">사내 임직원 전용 · 로그인 후 이용 가능합니다</p>
    <div class="field">
      <label for="login-empid">사번</label>
      <input id="login-empid" placeholder="예: 1001" autocomplete="off" />
    </div>
    <div class="field">
      <label for="login-name">성명</label>
      <input id="login-name" placeholder="예: 홍길동" autocomplete="off" />
    </div>
    <div class="field">
      <label for="login-pw">비밀번호</label>
      <input id="login-pw" type="password" placeholder="비밀번호" />
    </div>
    <div class="err" id="login-err"></div>
    <button class="btn block" id="login-submit">확인</button>
    <div class="hint-box">
      <b>데모 계정</b><br/>
      직원: 사번 <code>1001</code> / 홍길동 / pw <code>1234</code><br/>
      관리자: 사번 <code>9001</code> / 김총무 / pw <code>admin</code>
    </div>
  </div>
</div>

<!-- ===================== APP (after login) ===================== -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="logo">🏨 콘도 예약</div>
    <div class="tabs" id="main-tabs"></div>
    <div class="spacer"></div>
    <div class="userbox">
      <span id="who"></span>
      <button class="btn-logout" id="logout">로그아웃</button>
    </div>
  </div>

  <div class="wrap">
    <!-- ---- Employee: cards ---- -->
    <section id="view-cards" class="view">
      <h2 class="section">제휴 콘도</h2>
      <div class="cards" id="condo-cards"></div>
    </section>

    <!-- ---- Employee: detail (calendar + form) ---- -->
    <section id="view-detail" class="view hidden">
      <button class="btn ghost sm" id="back-to-cards" style="margin-bottom:16px;">← 목록으로</button>
      <div class="detail-header" id="detail-header"></div>
      <div class="grid-2">
        <div class="panel">
          <h3>날짜 선택</h3>
          <div class="field" style="margin-bottom:16px;">
            <label for="room-select">객실 타입</label>
            <select id="room-select"></select>
          </div>
          <div class="cal-head">
            <button class="cal-nav" id="cal-prev">‹</button>
            <span class="title" id="cal-title"></span>
            <button class="cal-nav" id="cal-next">›</button>
          </div>
          <div class="cal-grid" id="cal-dow"></div>
          <div class="cal-grid" id="cal-grid" style="margin-top:4px;"></div>
          <div class="legend">
            <span><i class="dot" style="background:#f6f8fc;border:1px solid var(--line);"></i> 예약 가능</span>
            <span><i class="dot" style="background:var(--danger-bg);"></i> 마감</span>
            <span><i class="dot" style="background:var(--brand);"></i> 선택중</span>
          </div>
        </div>

        <div class="panel">
          <h3>예약 신청</h3>
          <div class="policy">ℹ️ 사내 정책: 제휴 콘도는 1인 <b>연 1회</b> 이용을 권장합니다.</div>
          <div class="field">
            <label>체크인 / 체크아웃</label>
            <input id="f-dates" readonly placeholder="달력에서 날짜를 선택하세요" />
          </div>
          <div class="field">
            <label for="f-room">객실 타입</label>
            <input id="f-room" readonly />
          </div>
          <div class="field">
            <label for="f-guests">인원수</label>
            <input id="f-guests" type="number" min="1" value="2" />
          </div>
          <div class="field">
            <label for="f-note">신청 사유 / 비고 (선택)</label>
            <textarea id="f-note" rows="3" placeholder="예: 가족 여행"></textarea>
          </div>
          <div class="err" id="form-err"></div>
          <button class="btn block" id="submit-booking">예약 신청</button>
        </div>
      </div>
    </section>

    <!-- ---- Employee: my reservations ---- -->
    <section id="view-myres" class="view hidden">
      <h2 class="section">내 예약 신청 현황</h2>
      <div class="reqlist" id="my-reqlist"></div>
    </section>

    <!-- ---- Admin ---- -->
    <section id="view-admin" class="view hidden">
      <h2 class="section">총무부 관리자 · 신청 현황</h2>
      <div class="summary" id="status-summary"></div>
      <div class="reqlist" id="admin-list"></div>
    </section>
  </div>
</div>

<!-- ===================== Reject modal ===================== -->
<div class="overlay" id="reject-overlay">
  <div class="modal">
    <h3>반려 처리</h3>
    <p class="muted" style="font-size:13px;margin-top:0;">반려 사유를 입력하면 신청자에게 함께 표시됩니다.</p>
    <div class="field">
      <textarea id="reject-reason" rows="3" placeholder="예: 해당 기간 사내 행사로 이용 불가"></textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn ghost sm" id="reject-cancel">취소</button>
      <button class="btn danger sm" id="reject-confirm">반려 확정</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   Mock API layer (분리: 추후 REST API로 교체 가능)
   ========================================================= */
const api = (() => {
  // --- seed data ---
  const users = [
    { employee_id: "1001", name: "홍길동", password: "1234", dept: "영업1팀", email: "hong@company.com", role: "employee" },
    { employee_id: "1002", name: "이영희", password: "1234", dept: "개발팀", email: "lee@company.com", role: "employee" },
    { employee_id: "9001", name: "김총무", password: "admin", dept: "총무부", email: "admin@company.com", role: "admin" },
  ];

  const condos = [
    { id: "c1", name: "한화리조트 설악", region: "강원 속초", description: "설악산 자락의 가족형 휴양 리조트", icon: "🏔️", color: "#e7f5ff" },
    { id: "c2", name: "롯데리조트 제주", region: "제주 서귀포", description: "오션뷰 객실과 워터파크", icon: "🌊", color: "#e6fcf5" },
    { id: "c3", name: "켄싱턴 경주", region: "경북 경주", description: "보문호 인근 한옥풍 리조트", icon: "🏯", color: "#fff4e6" },
    { id: "c4", name: "대명 비발디파크", region: "강원 홍천", description: "사계절 레저와 스파", icon: "⛷️", color: "#f3f0ff" },
  ];

  const rooms = [
    { id: "r1", condo_id: "c1", type: "스탠다드 (4인)", capacity: 4 },
    { id: "r2", condo_id: "c1", type: "디럭스 (6인)", capacity: 6 },
    { id: "r3", condo_id: "c2", type: "오션뷰 (4인)", capacity: 4 },
    { id: "r4", condo_id: "c3", type: "한옥스위트 (5인)", capacity: 5 },
    { id: "r5", condo_id: "c4", type: "패밀리 (6인)", capacity: 6 },
  ];

  // 콘도(객실) 단위로 독립 관리되는 마감 날짜
  const bookedDatesByCondo = {
    c1: ["2026-07-04", "2026-07-05", "2026-07-18"],
    c2: ["2026-07-11", "2026-07-12", "2026-07-13"],
    c3: [],
    c4: ["2026-07-25"],
  };

  let reservations = [
    {
      id: "rv1", employee_id: "1002", employee_name: "이영희", employee_dept: "개발팀", employee_email: "lee@company.com",
      condo_id: "c2", room_id: "r3", checkin_date: "2026-07-11", checkout_date: "2026-07-13",
      guests: 3, note: "여름 휴가", status: "승인", reject_reason: null,
    },
    {
      id: "rv2", employee_id: "1001", employee_name: "홍길동", employee_dept: "영업1팀", employee_email: "hong@company.com",
      condo_id: "c1", room_id: "r1", checkin_date: "2026-08-02", checkout_date: "2026-08-04",
      guests: 2, note: "", status: "접수중", reject_reason: null,
    },
  ];

  let seq = 100;
  const clone = (o) => JSON.parse(JSON.stringify(o));

  // mock 이메일 인터페이스 (추후 SMTP/SendGrid 등으로 교체)
  function sendEmail(to, subject, body) {
    console.log("[mock email] →", to, "\n", subject, "\n", body);
    return Promise.resolve({ ok: true });
  }

  return {
    login: (empid, name, pw) => {
      const u = users.find(x => x.employee_id === empid && x.name === name && x.password === pw);
      return u ? clone(u) : null;
    },
    getCondos: () => clone(condos),
    getRooms: (condoId) => clone(rooms.filter(r => r.condo_id === condoId)),
    getBookedDates: (condoId) => (bookedDatesByCondo[condoId] || []).slice(),
    getMyReservations: (empid) => clone(reservations.filter(r => r.employee_id === empid))
      .sort((a, b) => b.id.localeCompare(a.id)),
    getAllReservations: () => clone(reservations).sort((a, b) => b.id.localeCompare(a.id)),

    createReservation: (data) => {
      const r = Object.assign({ id: "rv" + (++seq), status: "접수중", reject_reason: null }, data);
      reservations.push(r);
      return clone(r);
    },
    cancelReservation: (id, empid) => {
      const r = reservations.find(x => x.id === id);
      if (!r || r.employee_id !== empid) return false;
      if (!["접수중", "확인중"].includes(r.status)) return false;
      reservations = reservations.filter(x => x.id !== id);
      return true;
    },
    setReviewing: (id) => { const r = reservations.find(x => x.id === id); if (r) r.status = "확인중"; return clone(r); },

    // 승인: 동시성 대비, 서버측에서 날짜 재검증 후 마감 처리 (mock)
    approve: async (id, adminName) => {
      const r = reservations.find(x => x.id === id);
      if (!r) return { ok: false, reason: "not_found" };
      const range = dateRange(r.checkin_date, r.checkout_date);
      const booked = bookedDatesByCondo[r.condo_id] || (bookedDatesByCondo[r.condo_id] = []);
      // re-check (race condition guard)
      const conflict = range.find(d => booked.includes(d));
      if (conflict) return { ok: false, reason: "conflict", date: conflict };
      range.forEach(d => { if (!booked.includes(d)) booked.push(d); });
      r.status = "승인";
      await sendEmail(
        r.employee_email,
        `[콘도 예약 승인] ${condos.find(c => c.id === r.condo_id).name}`,
        `${r.employee_name}님, 예약이 승인되었습니다.\n` +
        `콘도: ${condos.find(c => c.id === r.condo_id).name}\n` +
        `일정: ${r.checkin_date} ~ ${r.checkout_date}\n` +
        `인원: ${r.guests}명\n처리자: ${adminName}`
      );
      return { ok: true, email: r.employee_email };
    },
    reject: (id, reason) => {
      const r = reservations.find(x => x.id === id);
      if (r) { r.status = "반려"; r.reject_reason = reason; }
      return clone(r);
    },
  };
})();

/* ------- date utils ------- */
function pad(n) { return String(n).padStart(2, "0"); }
function ymd(y, m, d) { return `${y}-${pad(m + 1)}-${pad(d)}`; }
function dateRange(start, end) {
  const out = [];
  const s = new Date(start), e = new Date(end);
  for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    out.push(`${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`);
  }
  return out;
}

/* =========================================================
   App state + views
   ========================================================= */
let currentUser = null;
let activeCondo = null;
let activeRoom = null;
let calYear, calMonth;
let selStart = null, selEnd = null;
let pendingRejectId = null;

const $ = (id) => document.getElementById(id);

function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 3200);
}

function badge(status) {
  const map = { "접수중": "recv", "확인중": "review", "승인": "approved", "반려": "rejected" };
  return `<span class="badge ${map[status]}">${status}</span>`;
}

/* ---------- LOGIN ---------- */
$("login-submit").addEventListener("click", doLogin);
$("login-pw").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });

function doLogin() {
  const empid = $("login-empid").value.trim();
  const name = $("login-name").value.trim();
  const pw = $("login-pw").value;
  if (!empid || !name || !pw) { $("login-err").textContent = "사번, 성명, 비밀번호를 모두 입력하세요."; return; }
  const u = api.login(empid, name, pw);
  if (!u) { $("login-err").textContent = "인증에 실패했습니다. 입력값을 확인하세요."; return; }
  currentUser = u;
  $("login-err").textContent = "";
  $("view-login").classList.add("hidden");
  $("app").classList.remove("hidden");
  $("who").textContent = `${u.name} · ${u.dept} (${u.employee_id})`;
  buildTabs();
  if (u.role === "admin") showView("admin"); else showView("cards");
}

$("logout").addEventListener("click", () => {
  currentUser = null;
  $("app").classList.add("hidden");
  $("view-login").classList.remove("hidden");
  $("login-pw").value = "";
});

/* ---------- Tabs / routing ---------- */
function buildTabs() {
  const tabs = $("main-tabs");
  tabs.innerHTML = "";
  const defs = currentUser.role === "admin"
    ? [{ k: "admin", t: "총무부 관리자 화면" }]
    : [{ k: "cards", t: "콘도 목록" }, { k: "myres", t: "내 예약 현황" }];
  defs.forEach(d => {
    const b = document.createElement("button");
    b.textContent = d.t; b.dataset.k = d.k;
    b.addEventListener("click", () => showView(d.k));
    tabs.appendChild(b);
  });
}

function showView(key) {
  // role guard
  if (key === "admin" && currentUser.role !== "admin") { toast("접근 권한이 없습니다."); return; }
  document.querySelectorAll(".view").forEach(v => v.classList.add("hidden"));
  const map = { cards: "view-cards", detail: "view-detail", myres: "view-myres", admin: "view-admin" };
  $(map[key]).classList.remove("hidden");
  document.querySelectorAll("#main-tabs button").forEach(b => {
    b.classList.toggle("active", b.dataset.k === key || (key === "detail" && b.dataset.k === "cards"));
  });
  if (key === "cards") renderCards();
  if (key === "myres") renderMyRes();
  if (key === "admin") renderAdmin();
}

/* ---------- Cards ---------- */
function renderCards() {
  const wrap = $("condo-cards");
  wrap.innerHTML = "";
  api.getCondos().forEach(c => {
    const el = document.createElement("div");
    el.className = "condo-card";
    el.innerHTML = `
      <div class="condo-photo" style="background:${c.color}">${c.icon}</div>
      <div class="condo-body">
        <h3>${c.name}</h3>
        <div class="loc">📍 ${c.region} · ${c.description}</div>
      </div>`;
    el.addEventListener("click", () => openDetail(c));
    wrap.appendChild(el);
  });
}

/* ---------- Detail + calendar ---------- */
function openDetail(condo) {
  activeCondo = condo;
  const rooms = api.getRooms(condo.id);
  activeRoom = rooms[0];
  selStart = selEnd = null;
  const now = new Date(2026, 6, 1); // 데모 기준 2026-07
  calYear = now.getFullYear(); calMonth = now.getMonth();

  $("detail-header").innerHTML = `
    <div class="icon" style="background:${condo.color};border-radius:12px;padding:6px 10px;">${condo.icon}</div>
    <div>
      <h2>${condo.name}</h2>
      <div class="muted">📍 ${condo.region} · ${condo.description}</div>
    </div>`;

  const rs = $("room-select");
  rs.innerHTML = "";
  rooms.forEach(r => {
    const o = document.createElement("option");
    o.value = r.id; o.textContent = r.type;
    rs.appendChild(o);
  });
  rs.onchange = () => {
    activeRoom = rooms.find(r => r.id === rs.value);
    selStart = selEnd = null;
    syncForm(); renderCalendar();
  };

  syncForm();
  renderCalendar();
  showView("detail");
}

$("back-to-cards").addEventListener("click", () => showView("cards"));
$("cal-prev").addEventListener("click", () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); });
$("cal-next").addEventListener("click", () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); });

function renderCalendar() {
  const dows = ["일", "월", "화", "수", "목", "금", "토"];
  $("cal-dow").innerHTML = dows.map(d => `<div class="cal-dow">${d}</div>`).join("");
  $("cal-title").textContent = `${calYear}년 ${calMonth + 1}월`;

  const booked = api.getBookedDates(activeCondo.id);
  const todayStr = "2026-06-30"; // 데모 기준 오늘
  const first = new Date(calYear, calMonth, 1).getDay();
  const days = new Date(calYear, calMonth + 1, 0).getDate();

  const grid = $("cal-grid");
  grid.innerHTML = "";
  for (let i = 0; i < first; i++) {
    grid.insertAdjacentHTML("beforeend", `<div class="cal-cell empty"></div>`);
  }
  for (let d = 1; d <= days; d++) {
    const ds = ymd(calYear, calMonth, d);
    const cell = document.createElement("div");
    cell.className = "cal-cell";
    cell.textContent = d;
    const isPast = ds < todayStr;
    const isBooked = booked.includes(ds);
    if (isBooked) cell.classList.add("booked");
    else if (isPast) cell.classList.add("past");
    else {
      cell.classList.add("avail");
      if (ds === selStart || ds === selEnd) cell.classList.add("sel");
      else if (selStart && selEnd && ds > selStart && ds < selEnd) cell.classList.add("inrange");
      cell.addEventListener("click", () => pickDate(ds));
    }
    grid.appendChild(cell);
  }
}

function pickDate(ds) {
  if (!selStart || (selStart && selEnd)) {
    selStart = ds; selEnd = null;
  } else {
    if (ds < selStart) { selStart = ds; selEnd = null; }
    else if (ds === selStart) { /* same day ignore */ }
    else {
      // 선택 구간에 마감일 포함 시 초기화
      const booked = api.getBookedDates(activeCondo.id);
      const range = dateRange(selStart, ds);
      if (range.some(x => booked.includes(x))) {
        toast("선택 구간에 마감된 날짜가 포함되어 선택을 초기화합니다.");
        selStart = selEnd = null;
        renderCalendar(); syncForm(); return;
      }
      selEnd = ds;
    }
  }
  renderCalendar();
  syncForm();
}

function syncForm() {
  $("f-room").value = activeRoom ? activeRoom.type : "";
  if (selStart && selEnd) $("f-dates").value = `${selStart} ~ ${selEnd}`;
  else if (selStart) $("f-dates").value = `${selStart} ~ (체크아웃 선택)`;
  else $("f-dates").value = "";
  $("form-err").textContent = "";
}

$("submit-booking").addEventListener("click", () => {
  if (!selStart || !selEnd) { $("form-err").textContent = "체크인/체크아웃 날짜를 선택하세요."; return; }
  const guests = parseInt($("f-guests").value, 10);
  if (!guests || guests < 1) { $("form-err").textContent = "인원수를 올바르게 입력하세요."; return; }
  if (activeRoom && guests > activeRoom.capacity) {
    $("form-err").textContent = `해당 객실 정원(${activeRoom.capacity}명)을 초과했습니다.`; return;
  }
  api.createReservation({
    employee_id: currentUser.employee_id, employee_name: currentUser.name,
    employee_dept: currentUser.dept, employee_email: currentUser.email,
    condo_id: activeCondo.id, room_id: activeRoom.id,
    checkin_date: selStart, checkout_date: selEnd,
    guests, note: $("f-note").value.trim(),
  });
  toast("예약 신청이 접수되었습니다. (상태: 접수중)");
  $("f-note").value = "";
  selStart = selEnd = null;
  syncForm(); renderCalendar();
  showView("myres");
});

/* ---------- My reservations ---------- */
function renderMyRes() {
  const wrap = $("my-reqlist");
  const list = api.getMyReservations(currentUser.employee_id);
  if (!list.length) { wrap.innerHTML = `<div class="empty-state">신청한 예약이 없습니다.</div>`; return; }
  const condos = api.getCondos();
  wrap.innerHTML = "";
  list.forEach(r => {
    const condo = condos.find(c => c.id === r.condo_id);
    const cancelable = ["접수중", "확인중"].includes(r.status);
    const el = document.createElement("div");
    el.className = "reqcard";
    el.innerHTML = `
      <div class="row1">
        <div>
          <h4>${condo.name}</h4>
          <div class="meta">${r.checkin_date} ~ ${r.checkout_date} · ${r.guests}명${r.note ? " · " + r.note : ""}</div>
        </div>
        ${badge(r.status)}
      </div>
      ${r.status === "반려" && r.reject_reason ? `<div class="reject-reason">반려 사유: ${r.reject_reason}</div>` : ""}
      ${cancelable ? `<div class="actions"><button class="btn ghost sm" data-cancel="${r.id}">신청 취소</button></div>` : ""}`;
    wrap.appendChild(el);
  });
  wrap.querySelectorAll("[data-cancel]").forEach(b => {
    b.addEventListener("click", () => {
      if (api.cancelReservation(b.dataset.cancel, currentUser.employee_id)) {
        toast("예약 신청을 취소했습니다."); renderMyRes();
      }
    });
  });
}

/* ---------- Admin ---------- */
function renderAdmin() {
  const list = api.getAllReservations();
  const counts = { "접수중": 0, "확인중": 0, "승인": 0, "반려": 0 };
  list.forEach(r => counts[r.status]++);
  $("status-summary").innerHTML = Object.entries(counts).map(([k, v]) => `
    <div class="scard"><div class="num">${v}</div><div class="lbl">${k}</div></div>`).join("");

  const condos = api.getCondos();
  const wrap = $("admin-list");
  if (!list.length) { wrap.innerHTML = `<div class="empty-state">신청 내역이 없습니다.</div>`; return; }
  wrap.innerHTML = "";
  list.forEach(r => {
    const condo = condos.find(c => c.id === r.condo_id);
    const el = document.createElement("div");
    el.className = "reqcard";
    let actions = "";
    if (r.status === "접수중") actions += `<button class="btn warn sm" data-review="${r.id}">확인중으로</button>`;
    if (["접수중", "확인중"].includes(r.status)) {
      actions += `<button class="btn ok sm" data-approve="${r.id}">승인</button>`;
      actions += `<button class="btn danger sm" data-reject="${r.id}">반려</button>`;
    }
    el.innerHTML = `
      <div class="row1">
        <div>
          <h4>${condo.name} <span class="muted" style="font-weight:400;">· ${r.checkin_date} ~ ${r.checkout_date}</span></h4>
          <div class="meta">${r.employee_name} · ${r.employee_dept} · ${r.employee_email} · ${r.guests}명${r.note ? " · " + r.note : ""}</div>
        </div>
        ${badge(r.status)}
      </div>
      ${r.status === "반려" && r.reject_reason ? `<div class="reject-reason">반려 사유: ${r.reject_reason}</div>` : ""}
      ${actions ? `<div class="actions">${actions}</div>` : ""}`;
    wrap.appendChild(el);
  });

  wrap.querySelectorAll("[data-review]").forEach(b =>
    b.addEventListener("click", () => { api.setReviewing(b.dataset.review); renderAdmin(); }));
  wrap.querySelectorAll("[data-approve]").forEach(b =>
    b.addEventListener("click", async () => {
      const res = await api.approve(b.dataset.approve, currentUser.name);
      if (!res.ok && res.reason === "conflict") { toast(`이미 마감된 날짜(${res.date})가 있어 승인할 수 없습니다.`); renderAdmin(); return; }
      toast(`승인 완료 · ${res.email} 으로 승인 안내 메일을 발송했습니다.`);
      renderAdmin();
    }));
  wrap.querySelectorAll("[data-reject]").forEach(b =>
    b.addEventListener("click", () => { pendingRejectId = b.dataset.reject; $("reject-reason").value = ""; $("reject-overlay").classList.add("show"); }));
}

/* ---------- Reject modal ---------- */
$("reject-cancel").addEventListener("click", () => $("reject-overlay").classList.remove("show"));
$("reject-overlay").addEventListener("click", (e) => { if (e.target.id === "reject-overlay") $("reject-overlay").classList.remove("show"); });
$("reject-confirm").addEventListener("click", () => {
  const reason = $("reject-reason").value.trim();
  if (!reason) { toast("반려 사유를 입력하세요."); return; }
  api.reject(pendingRejectId, reason);
  $("reject-overlay").classList.remove("show");
  toast("반려 처리되었습니다.");
  renderAdmin();
});
</script>
